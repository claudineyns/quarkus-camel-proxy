# ── Portas de entrada ────────────────────────────────────────────────────────
proxy.port.http=8181
proxy.port.https=8282

# ── TLS do servidor (certificado do próprio proxy, via Secret OpenShift) ─────
proxy.tls.server-keystore=D:/temp/certs/keystore.p12
proxy.tls.server-keystore-password=changeit

# ── TLS cliente / mTLS para backends (keystore por host) ─────────────────────
proxy.tls.keystore-dir=D:/temp/certs/
proxy.tls.keystore-password=changeit

# ── Pool de conexões HTTP (camel-http + backend binário) ─────────────────────
proxy.http.pool.max-total=200
proxy.http.pool.max-per-route=20

# ── Redis ────────────────────────────────────────────────────────────────────
quarkus.redis.hosts=redis://localhost:6379

# ── Kafka ────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=localhost:9092

# ── Logging ──────────────────────────────────────────────────────────────────
quarkus.log.level=INFO
quarkus.log.category."br.dev.claudiney.proxy".level=DEBUG
